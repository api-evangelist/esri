aid: esri
name: Esri
url: https://raw.githubusercontent.com/api-evangelist/esri/refs/heads/main/apis.yml
description: >-
  Esri is a global leader in geographic information system (GIS) technology,
  offering innovative solutions for mapping and spatial analysis. The company
  provides software, data, and services to help organizations make better
  decisions based on location intelligence. Esri's technology is used across a
  wide range of industries, including government, natural resources, utilities,
  and public safety. NOTE: This repository is an alias for the canonical Esri
  ArcGIS profile maintained at api-evangelist/esri-arcgis, which contains the
  full set of API definitions, OpenAPI artifacts, and developer resources.
