    name: Esri ArcGIS Platform API
    description: >-
      The Esri ArcGIS Platform API is a set of REST APIs and SDKs from Esri,
      provider of the ArcGIS GIS suite. It enables developers to integrate
      Esri's mapping, geocoding, routing, and spatial analysis services into
      applications, supporting visualization, analysis, and interaction with
      spatial data. See the canonical esri-arcgis repository for the full set
      of APIs and OpenAPI artifacts.
